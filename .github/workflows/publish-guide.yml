name: Publish style guide

# Build the style guide and deploy it to the gh-pages branch.
# Runs only on pushes to master, after the CI workflow has validated the commit.
on:
  push:
    branches:
      - master

permissions:
  pages: write
  contents: write
  id-token: write

jobs:
  publish_guide:
    name: Build and deploy style guide
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24.15.0"
          cache: "npm"

      - name: Install packages
        run: npm ci

      - name: Build style guide
        run: npx styleguidist build --config styleguide.config.cjs

      - name: Upload pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./styleguide"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
