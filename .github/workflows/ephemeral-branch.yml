name: CI

# Build and test the components on every push and pull request,
# except for the gh-pages branch (which only holds the published styleguide).
on:
  push:
    branches:
      - "feature/**"
      - "support/**"
      - "dependabot/**"

jobs:
  build_test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
      - name: Install packages
        run: npm ci
      - name: Build components
        run: npm run build
      - name: Test components
        run: npm test -- -w 1 --coverage --reporters=default --reporters=jest-junit --detectOpenHandles --forceExit
      - name: Upload JUnit test results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: junit-results
          path: ./junit.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.1
        with:
          files: ./coverage/cobertura-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
